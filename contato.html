<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="scss/style.scss" rel="stylesheet" />
</head>
<body>

    <div class="container mt-5">
        <form id="form-contato">
            <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
        </div>
        
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Seu email" required>
        </div>

        <div class="mb-3">
            <label for="mensagem" class="form-label">Comentários</label>
            <textarea class="form-control" id="mensagem" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>

    <div id="area-alertas" class="container mt-3"></div>

    <script type="module" src="js/main.ts"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
