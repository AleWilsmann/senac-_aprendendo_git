<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="scss/style.scss" rel="stylesheet" />
</head>
<body>

    <div class="container mt-5">

    <h2 class="mb-4">🛒 Seu Carrinho</h2>

    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Quantidade</th>
                    <th>Total</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="lista-carrinho">

            </tbody>
        </table>
    </div>

  
    <div class="text-end mt-4">
        <h4>Total: <span id="total-carrinho">R$ 0,00</span></h4>
    </div>


   
    <div class="d-flex justify-content-between mt-4">
        <a href="produtos.html" class="btn btn-secondary">
            Continuar comprando
        </a>

        <button class="btn btn-success">
            Finalizar compra
        </button>
    </div>

</div>

<script>
function carregarCarrinho(){
    
    const lista = document.getElementById("lista-carrinho");
    const totalSpan = document.getElementById("total-carrinho");

    let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
    lista.innerHTML = "";

    let total = 0;

    carrinho.forEach((produto, index) => {


        lista.innerHTML += `
        <tr>
            <td>
                <strong>${produto.nome}</strong><br>
                <small>${produto.descricao}</small>
            </td>
            <td>${produto.preco.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}</td>
            <td>${produto.quantidade}</td>
            <td>${(produto.preco * produto.quantidade).toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="removerItem(${index})">
                    Remover
                </button>
            </td>
        </tr>
        `;
        total += produto.preco * produto.quantidade;
    });

    totalSpan.innerText = total.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    
}

function removerItem(index){

    let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

    if (index < 0 || index >= carrinho.length) return;

    const nomeProduto = carrinho[index].nome;
    
     if (!confirm(`Tem certeza que deseja remover "${nomeProduto}" do carrinho?`)) {
        return;
    }
    carrinho.splice(index,1);

    localStorage.setItem("carrinho", JSON.stringify(carrinho));

    carregarCarrinho();
    atualizarContadorCarrinho();
}

carregarCarrinho();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
